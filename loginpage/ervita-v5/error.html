<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="theme-color" content="#ef4444">
    <meta name="msapplication-navbutton-color" content="#ef4444">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Error - ERVITA.NET</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%90%3C/text%3E%3C/svg%3E">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    
    <div class="result-page">
        <div class="result-card animate-scaleIn">
            <div class="result-icon error">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <h2>Terjadi Kesalahan</h2>
            <p id="error-message">$(error)</p>
            
            <a href="$(link-login)" class="btn btn-primary btn-block" style="margin-top:var(--space-4);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Kembali ke Login
            </a>
            
            <div style="margin-top:var(--space-5);padding-top:var(--space-4);border-top:1px solid var(--border);">
                <a href="https://wa.me/6285172207018" target="_blank" style="color:#25d366;text-decoration:none;font-size:0.875rem;display:inline-flex;align-items:center;gap:var(--space-2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                    Hubungi Support
                </a>
            </div>
        </div>
        
        <footer class="footer" style="margin-top:var(--space-6);">
            <p>&copy; 2026 ERVITA.NET - Internet Cepat & Stabil</p>
        </footer>
    </div>
    
    <!-- Scripts -->
    <script src="js/setting.js"></script>
    
    <script>
        // Translate error messages
        (function() {
            const settings = window.SETTINGS || {};
            const messages = settings.errorMessages || {};
            const errorEl = document.getElementById('error-message');
            
            if (errorEl) {
                let errorText = errorEl.textContent.trim();
                
                // Try to find matching translation
                for (const key in messages) {
                    if (errorText.toLowerCase().includes(key.toLowerCase()) || 
                        key.toLowerCase().includes(errorText.toLowerCase())) {
                        errorText = messages[key];
                        break;
                    }
                }
                
                // Default translations
                const defaults = {
                    'invalid username or password': 'Kode voucher salah atau tidak terdaftar',
                    'user not found': 'Voucher tidak ditemukan',
                    'uptime limit': 'Masa aktif voucher sudah habis',
                    'traffic limit': 'Kuota voucher sudah habis',
                    'session limit': 'Batas session tercapai'
                };
                
                for (const key in defaults) {
                    if (errorText.toLowerCase().includes(key)) {
                        errorText = defaults[key];
                        break;
                    }
                }
                
                errorEl.textContent = errorText;
            }
        })();
    </script>
    
</body>
</html>
