<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Web Client</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- ============================================
         SIDEBAR KIRI - LIST CHAT
         ============================================ -->
    <aside class="sidebar">
      <!-- Header Sidebar -->
      <div class="sidebar-header">
        <div class="profile-section">
          <div class="profile-avatar">
            <img src="https://via.placeholder.com/40/128C7E/FFFFFF?text=Bot" alt="Bot Profile" id="bot-avatar">
          </div>
          <div class="profile-info">
            <span class="profile-name" id="bot-name">Telegram Bot</span>
            <span class="profile-status" id="bot-status">Online</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="btn-refresh" title="Refresh">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="icon-btn" id="btn-new-chat" title="Chat Baru">
            <i class="fas fa-comment-medical"></i>
          </button>
          <button class="icon-btn" id="btn-menu" title="Menu">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="Cari chat...">
        </div>
      </div>

      <!-- Chat List -->
      <div class="chat-list" id="chat-list">
        <!-- Chat items akan di-render di sini -->
        <div class="loading-chats">
          <i class="fas fa-spinner fa-spin"></i>
          <span>Memuat chat...5328648743</span>
        </div>
      </div>
    </aside>

    <!-- ============================================
         MAIN AREA - CHAT ROOM
         ============================================ -->
    <main class="chat-area" id="chat-area">
      <!-- Default State (belum pilih chat) -->
      <div class="empty-state" id="empty-state">
        <div class="empty-content">
          <div class="empty-icon">
            <i class="fab fa-telegram"></i>
          </div>
          <h2>Telegram Web Client</h2>
          <p>Pilih chat dari sidebar untuk memulai percakapan</p>
          <div class="empty-features">
            <div class="feature-item">
              <i class="fas fa-paper-plane"></i>
              <span>Kirim Pesan</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-image"></i>
              <span>Kirim Media</span>
            </div>
            <div class="feature-item">
              <i class="fas fa-bolt"></i>
              <span>Spam Mode</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Active Chat (hidden by default) -->
      <div class="active-chat" id="active-chat" style="display: none;">
        <!-- Chat Header -->
        <div class="chat-header">
          <div class="chat-header-left">
            <button class="icon-btn mobile-back" id="btn-back">
              <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-avatar">
              <img src="https://via.placeholder.com/40/25D366/FFFFFF?text=U" alt="User" id="current-chat-avatar">
            </div>
            <div class="chat-info">
              <span class="chat-name" id="current-chat-name">User Name</span>
              <span class="chat-status" id="current-chat-status">online</span>
            </div>
          </div>
          <div class="chat-header-right">
            <button class="icon-btn" id="btn-search-chat" title="Cari">
              <i class="fas fa-search"></i>
            </button>
            <button class="icon-btn" id="btn-attach" title="Lampirkan">
              <i class="fas fa-paperclip"></i>
            </button>
            <button class="icon-btn" id="btn-spam-toggle" title="Spam Mode">
              <i class="fas fa-bolt"></i>
            </button>
            <button class="icon-btn" id="btn-chat-menu" title="Menu">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </div>

        <!-- Spam Panel (collapsible) -->
        <div class="spam-panel" id="spam-panel" style="display: none;">
          <div class="spam-header">
            <i class="fas fa-bolt"></i>
            <span>SPAM MODE</span>
          </div>
          <div class="spam-controls">
            <div class="spam-input-group">
              <label>Jumlah Pesan</label>
              <input type="number" id="spam-count" value="10" min="1" max="100">
            </div>
            <div class="spam-input-group">
              <label>Delay (ms)</label>
              <input type="number" id="spam-delay" value="1000" min="100" step="100">
            </div>
            <div class="spam-input-group">
              <label>Pesan</label>
              <input type="text" id="spam-message" placeholder="Pesan yang akan di-spam...">
            </div>
            <button class="btn-spam-start" id="btn-spam-start">
              <i class="fas fa-play"></i>
              <span>START SPAM</span>
            </button>
            <button class="btn-spam-stop" id="btn-spam-stop" style="display: none;">
              <i class="fas fa-stop"></i>
              <span>STOP</span>
            </button>
          </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-container" id="messages-container">
          <!-- Messages akan di-render di sini -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-actions">
            <button class="icon-btn" id="btn-emoji" title="Emoji">
              <i class="far fa-smile"></i>
            </button>
            <button class="icon-btn" id="btn-attach-input" title="Lampirkan">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div class="message-input-wrapper">
            <input type="text" id="message-input" placeholder="Ketik pesan...">
          </div>
          <div class="input-actions-right">
            <button class="icon-btn" id="btn-send" title="Kirim">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>

        <!-- Attachment Menu -->
        <div class="attachment-menu" id="attachment-menu" style="display: none;">
          <div class="attachment-item" data-type="photo">
            <div class="attachment-icon photo">
              <i class="fas fa-image"></i>
            </div>
            <span>Foto</span>
          </div>
          <div class="attachment-item" data-type="video">
            <div class="attachment-icon video">
              <i class="fas fa-video"></i>
            </div>
            <span>Video</span>
          </div>
          <div class="attachment-item" data-type="audio">
            <div class="attachment-icon audio">
              <i class="fas fa-music"></i>
            </div>
            <span>Audio</span>
          </div>
          <div class="attachment-item" data-type="document">
            <div class="attachment-icon document">
              <i class="fas fa-file"></i>
            </div>
            <span>Dokumen</span>
          </div>
          <div class="attachment-item" data-type="location">
            <div class="attachment-icon location">
              <i class="fas fa-map-marker-alt"></i>
            </div>
            <span>Lokasi</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ============================================
       MODALS & OVERLAYS
       ============================================ -->

  <!-- New Chat Modal -->
  <div class="modal" id="new-chat-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Chat Baru</h3>
        <button class="modal-close" id="close-new-chat">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Chat ID</label>
          <input type="text" id="new-chat-id" placeholder="Masukkan Chat ID (contoh: 123456789)">
        </div>
        <div class="form-group">
          <label>Pesan Pertama (Opsional)</label>
          <input type="text" id="new-chat-message" placeholder="Halo...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-new-chat">Batal</button>
        <button class="btn-primary" id="btn-start-new-chat">Mulai Chat</button>
      </div>
    </div>
  </div>

  <!-- Media Upload Modal -->
  <div class="modal" id="media-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="media-modal-title">Kirim Media</h3>
        <button class="modal-close" id="close-media-modal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Pilih File</label>
          <input type="file" id="media-file" accept="*/*">
        </div>
        <div class="form-group">
          <label>Caption (Opsional)</label>
          <input type="text" id="media-caption" placeholder="Tambahkan caption...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-media">Batal</button>
        <button class="btn-primary" id="btn-send-media">Kirim</button>
      </div>
    </div>
  </div>

  <!-- Location Modal -->
  <div class="modal" id="location-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Kirim Lokasi</h3>
        <button class="modal-close" id="close-location-modal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Latitude</label>
          <input type="text" id="location-lat" placeholder="-6.2088">
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="text" id="location-lng" placeholder="106.8456">
        </div>
        <button class="btn-secondary" id="btn-get-current-location">
          <i class="fas fa-location-arrow"></i>
          Gunakan Lokasi Saya
        </button>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-location">Batal</button>
        <button class="btn-primary" id="btn-send-location">Kirim Lokasi</button>
      </div>
    </div>
  </div>

  <!-- MikroTik Panel -->
  <div class="modal" id="mikrotik-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3><i class="fas fa-server"></i> MikroTik Monitor</h3>
        <button class="modal-close" id="close-mikrotik-modal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="mikrotik-info" id="mikrotik-info">
          <div class="loading-data">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Memuat data MikroTik...</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-refresh-mikrotik">
          <i class="fas fa-sync-alt"></i>
          Refresh
        </button>
        <button class="btn-primary" id="btn-close-mikrotik">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Audio untuk notifikasi -->
  <audio id="notification-sound" preload="auto">
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE" type="audio/wav">
  </audio>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
