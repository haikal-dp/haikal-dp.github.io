<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="theme-color" content="#0f172a">
    <meta name="msapplication-navbutton-color" content="#0f172a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login Member - ERVITA.NET</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%90%3C/text%3E%3C/svg%3E">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    
    <!-- MikroTik Hidden Form (CHAP) -->
    <span class="hilang">$(if chap-id)</span>
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none;">
        <input type="hidden" name="username">
        <input type="hidden" name="password">
        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">
    </form>
    <script src="js/md5.js"></script>
    <span class="hilang">$(endif)</span>
    
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                        <line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>ERVITA.NET</h1>
                    <span>Login Member</span>
                </div>
            </div>
            <a href="login.html" class="icon-btn" style="text-decoration:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </a>
        </header>
        
        <!-- Main Content -->
        <main class="main-content">
            
            <div class="card animate-fadeIn" style="margin-top:var(--space-4);">
                <div class="card-header">
                    <div style="width:72px;height:72px;background:var(--gradient-primary);border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-4);color:white;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h2>Login Member</h2>
                    <p>Masukkan username dan password member Anda</p>
                </div>
                
                <div id="error-container"></div>
                
                <form id="member-form" name="loginuspw" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLoginUSPW()" $(endif)>
                    <input type="hidden" name="dst" value="$(link-orig)">
                    <input type="hidden" name="popup" value="true">
                    
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input 
                            type="text" 
                            id="username-input" 
                            name="username" 
                            class="input-field" 
                            placeholder="Username"
                            autocomplete="off"
                            autofocus
                            required
                        >
                    </div>
                    
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input 
                            type="password" 
                            id="member-password" 
                            name="password" 
                            class="input-field" 
                            placeholder="Password"
                            required
                        >
                        <button type="button" class="password-toggle" tabindex="-1">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4);">
                        <input type="checkbox" id="remember-me" style="width:16px;height:16px;accent-color:var(--primary);">
                        <label for="remember-me" style="font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">Ingat username</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Login Member
                    </button>
                </form>
                
                <div style="text-align:center;margin-top:var(--space-5);padding-top:var(--space-4);border-top:1px solid var(--border);">
                    <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:var(--space-2);">Sudah punya voucher?</p>
                    <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none;font-size:0.9rem;">Login dengan Voucher</a>
                </div>
            </div>
            
        </main>
        
        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 ERVITA.NET - Internet Cepat & Stabil</p>
        </footer>
    </div>
    
    <!-- Scripts -->
    <script src="js/setting.js"></script>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
    
    <script>
        function doLoginUSPW() {
            var form = document.forms.loginuspw;
            var sendin = document.forms.sendin;
            
            if (!form || !sendin) return true;
            
            sendin.username.value = form.username.value;
            
            $(if chap-id)
            if (typeof hexMD5 === 'function') {
                sendin.password.value = hexMD5('$(chap-id)' + form.password.value + '$(chap-challenge)');
                sendin.submit();
                return false;
            }
            $(endif)
            
            return true;
        }
    </script>
    
</body>
</html>
