<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Hotspot">
    <meta name="theme-color" content="#2563eb">
    <meta name="msapplication-navbutton-color" content="#2563eb">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="img/favicon.png">
    <title>Logout - Hotspot WiFi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ervita.css">
    <script>
        function openLogin() {
            if (window.name != 'hotspot_logout') return true;
            open('$(link-login)', '_blank', '');
            window.close();
            return false;
        }
    </script>
</head>
<body>
    <div class="result-page">
        <div class="result-card animate-scaleIn">
            <div class="result-icon success">
                <i class="fas fa-check"></i>
            </div>
            <h2>Terima Kasih!</h2>
            <p>Anda telah berhasil logout dari jaringan kami.<br><br>Telah menggunakan layanan internet kami. Silakan klik tombol di bawah untuk login kembali.</p>
            
            <form action="$(link-login)" name="login" onSubmit="return openLogin()">
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-arrow-circle-left"></i> Kembali Login
                </button>
            </form>
            
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
                <a href="login.html" style="color: var(--primary); text-decoration: none; font-size: 0.875rem;">
                    <i class="fas fa-home"></i> Ke Halaman Utama
                </a>
            </div>
        </div>
        
        <footer class="footer" style="margin-top: 2rem;">
            <p data-fill="copyright">&copy; 2026 Hotspot WiFi</p>
        </footer>
    </div>
    
    <script src="js/setting.js"></script>
</body>
</html>
