<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>EVRVITA.NET - Error</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="header">
                <img src="img/logo.png" alt="EVRVITA.NET" class="logo" />
                <div class="brand-title">EVRVITA<span>.NET</span></div>
                <div class="brand-subtitle">Kesalahan Hotspot</div>
            </div>
            <div style="padding: 0 24px 24px;">
                <div class="alert alert-error show" style="margin-bottom:20px">
                    <strong>Error:</strong> $(error)
                </div>
                <p class="info-text" style="margin-bottom:16px">
                    Halaman login: <a href="$(link-login)" style="color:var(--primary);text-decoration:none;font-weight:600">$(link-login)</a>
                </p>
                <a href="$(link-login)" class="btn btn-primary" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                    Kembali ke Login
                </a>
            </div>
        </div>

        <div class="footer">
            <div class="footer-brand">ERVITA.NET</div>
            <div class="footer-info">Pasar Rau<br/><a href="https://wa.me/6285172207018">WhatsApp: 085172207018</a></div>
        </div>
    </div>
</body>
</html>
