<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Hotspot">
    <meta name="theme-color" content="#2563eb">
    <meta name="msapplication-navbutton-color" content="#2563eb">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="img/favicon.png">
    <title>Fitur - Hotspot WiFi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/ervita.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-wifi"></i>
                </div>
                <h1 data-fill="brand-name">HOTSPOT</h1>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-title">
                <h2><i class="fas fa-star" style="margin-right: 8px;"></i>Fitur Unggulan</h2>
                <p>Kenapa memilih kami?</p>
            </div>

            <!-- Features Grid -->
            <div class="menu-grid" id="fitur-list" style="grid-template-columns: 1fr;">
                <!-- Fitur akan di-generate oleh setting.js -->
            </div>

            <!-- CTA Card -->
            <div class="card animate-fadeInUp" style="text-align: center;">
                <h3 style="margin-bottom: 0.5rem;">Siap Bergabung?</h3>
                <p style="color: var(--gray-600); margin-bottom: 1rem;">Pilih paket yang sesuai dengan kebutuhan Anda</p>
                <a href="voucher.html" class="btn btn-primary">
                    <i class="fas fa-shopping-cart"></i> Lihat Paket Voucher
                </a>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p data-fill="copyright">&copy; 2026 Hotspot WiFi</p>
        </footer>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav"></nav>
    
    <script src="js/setting.js"></script>
</body>
</html>
