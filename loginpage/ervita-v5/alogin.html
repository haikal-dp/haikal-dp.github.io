<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="theme-color" content="#10b981">
    <meta name="msapplication-navbutton-color" content="#10b981">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login Berhasil - ERVITA.NET</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%90%3C/text%3E%3C/svg%3E">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <script>
        function startClock() {
            $(if popup == 'true')
            open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=350,height=500');
            $(endif)
            location.href = '$(link-status)';
        }
    </script>
</head>
<body onload="startClock()">
    
    <div class="result-page">
        <div class="result-card animate-scaleIn">
            <div class="spinner"></div>
            <h2>Login Berhasil!</h2>
            <p>Selamat! Anda berhasil terhubung ke jaringan ERVITA.NET.<br><br>Anda akan diarahkan ke halaman status...</p>
            
            <a href="status.html" class="btn btn-primary btn-block" style="margin-top:var(--space-4);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
                Lanjutkan Sekarang
            </a>
        </div>
        
        <footer class="footer" style="margin-top:var(--space-6);">
            <p>&copy; 2026 ERVITA.NET - Internet Cepat & Stabil</p>
        </footer>
    </div>
    
</body>
</html>
