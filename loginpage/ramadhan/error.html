<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="Author" content="ERVITA.NET">
    <meta name="theme-color" content="#ef4444">
    <meta name="msapplication-navbutton-color" content="#ef4444">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ef4444">
    <meta name="description" content="Error - ERVITA.NET">
    <link rel="icon" href="img/favicon.png">
    <title>Error - ERVITA.NET | Ramadhan Mubarak</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Ramadhan Theme CSS -->
    <link rel="stylesheet" href="css/ramadhan.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
            text-align: center;
            background: var(--bg-gradient-dark);
            position: relative;
            overflow: hidden;
        }
        
        .error-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            box-shadow: var(--shadow-lg);
            max-width: 360px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .error-icon {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-5);
            font-size: 3rem;
            background: var(--danger-light);
            color: var(--danger);
        }
        
        .error-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: var(--space-3);
        }
        
        .error-card p {
            color: var(--gray-600);
            margin-bottom: var(--space-6);
            line-height: 1.7;
        }
    </style>
</head>
<body>
    
    <!-- Ornament Background -->
    <div class="ornament-bg">
        <svg class="ornament-moon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 10C51.4 10 10 51.4 10 100C10 148.6 51.4 190 100 190C106.5 190 112.8 189.2 118.8 187.7C81.2 179.5 52.5 146.8 52.5 107.5C52.5 63.5 87.5 27.5 131.5 27.5C138.5 27.5 145.3 28.5 151.8 30.3C137.5 17.5 119.5 10 100 10Z" fill="white"/>
            <circle cx="80" cy="70" r="8" fill="white" opacity="0.3"/>
            <circle cx="120" cy="100" r="5" fill="white" opacity="0.2"/>
            <circle cx="90" cy="130" r="6" fill="white" opacity="0.25"/>
        </svg>
        <svg class="ornament-lantern" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 0L70 20H50L60 0Z" fill="white"/>
            <rect x="45" y="20" width="30" height="10" rx="2" fill="white"/>
            <path d="M30 30H90L100 50H20L30 30Z" fill="white"/>
            <rect x="25" y="50" width="70" height="80" rx="5" fill="white"/>
            <path d="M25 90H95" stroke="white" stroke-width="2" opacity="0.5"/>
            <path d="M25 70H95" stroke="white" stroke-width="2" opacity="0.5"/>
            <path d="M25 110H95" stroke="white" stroke-width="2" opacity="0.5"/>
            <path d="M20 130H100L90 150H30L20 130Z" fill="white"/>
            <rect x="45" y="150" width="30" height="10" rx="2" fill="white"/>
            <path d="M60 160L60 180" stroke="white" stroke-width="2"/>
            <circle cx="60" cy="90" r="15" fill="white" opacity="0.3"/>
        </svg>
        <div class="ornament-pattern"></div>
    </div>

    <div class="error-page">
        <div class="error-card animate-scaleIn">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2>Terjadi Kesalahan</h2>
            <p id="errorMessage">$(error)</p>
            
            <a href="$(link-login)" class="btn btn-primary btn-block" style="margin-top: 1rem;">
                <i class="fas fa-arrow-circle-left"></i> Kembali ke Login
            </a>
            
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
                <a href="https://wa.me/6285173229118" target="_blank" style="color: #25d366; text-decoration: none; font-size: 0.875rem;">
                    <i class="fab fa-whatsapp"></i> Hubungi Support
                </a>
            </div>
        </div>
        
        <footer class="footer" style="margin-top: 2rem; position: relative; z-index: 1;">
            <p>&copy; 2026 <span class="hotspot-brand">ERVITA.NET</span></p>
            <p>Internet Cepat & Stabil</p>
        </footer>
    </div>
    
    <script>
        // Translate common errors
        const errorTranslations = {
            'user $(username) has reached uptime limit': 'Masa aktif voucher Anda sudah habis',
            'user $(username) has reached traffic limit': 'Kuota voucher Anda sudah habis',
            'no valid profile found': 'Profil voucher tidak valid',
            'invalid username or password': 'Kode voucher salah atau tidak terdaftar',
            'user <$(username)> not found': 'Voucher tidak ditemukan',
            'simultaneous session limit reached': 'Batas session tercapai',
            'no more sessions are allowed for user $(username)': 'Voucher sedang digunakan di perangkat lain'
        };
        
        const errorMsg = document.getElementById('errorMessage').textContent;
        if (errorTranslations[errorMsg]) {
            document.getElementById('errorMessage').textContent = errorTranslations[errorMsg];
        }
    </script>
</body>
</html>
